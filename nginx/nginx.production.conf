# ══════════════════════════════════════════════════════════════════════════════
# nginx/nginx.production.conf
#
# Production Nginx config — HTTPS with Let's Encrypt (auto-renewal via certbot).
#
# HOW TO DEPLOY (Ubuntu/Debian VPS):
#   1.  Point DNS A records at your VPS IP:
#         medierp.app       → <VPS IP>
#         www.medierp.app   → <VPS IP>
#         api.medierp.app   → <VPS IP>   (optional; you can use same domain)
#
#   2.  Install Nginx + Certbot:
#         sudo apt update
#         sudo apt install -y nginx certbot python3-certbot-nginx
#
#   3.  Copy this file:
#         sudo cp nginx.production.conf /etc/nginx/sites-available/medierp
#         sudo ln -s /etc/nginx/sites-available/medierp \
#                    /etc/nginx/sites-enabled/medierp
#         sudo rm /etc/nginx/sites-enabled/default
#
#   4.  Replace all REPLACE_WITH_YOUR_DOMAIN with your real domain.
#       Replace REPLACE_WITH_YOUR_VPS_IP.
#
#   5.  Obtain certificate (runs HTTP challenge on port 80):
#         sudo certbot --nginx -d medierp.app -d www.medierp.app
#
#   6.  Test + reload:
#         sudo nginx -t && sudo systemctl reload nginx
#
#   7.  Auto-renewal (certbot installs a cron/systemd timer automatically):
#         sudo certbot renew --dry-run
#
# Architecture (prod):
#   Browser ─── HTTPS:443 ──► Nginx ─► Express :5000 (serves built SPA + API)
#
# In production, Express serves the built React SPA from the dist/ folder.
# There is no separate Vite server.
# ══════════════════════════════════════════════════════════════════════════════

# Upstream — Express backend
upstream medierp_backend {
  server 127.0.0.1:5000;
  keepalive 32;
}

# ── Rate limiting zones ───────────────────────────────────────────────────────
# Shared memory zones for per-IP rate limiting at the Nginx layer.
# These are a first line of defence BEFORE requests reach Express.

limit_req_zone $binary_remote_addr zone=api_zone:10m      rate=60r/m;
limit_req_zone $binary_remote_addr zone=auth_zone:10m     rate=10r/m;
limit_req_zone $binary_remote_addr zone=scanner_zone:10m  rate=120r/m;

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
  listen 80;
  listen [::]:80;
  server_name REPLACE_WITH_YOUR_DOMAIN www.REPLACE_WITH_YOUR_DOMAIN;

  # Allow Let's Encrypt ACME challenge for certificate renewal
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
    allow all;
  }

  # Redirect everything else to HTTPS
  location / {
    return 301 https://$host$request_uri;
  }
}

# ── HTTPS server ──────────────────────────────────────────────────────────────
server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name REPLACE_WITH_YOUR_DOMAIN www.REPLACE_WITH_YOUR_DOMAIN;

  # ── TLS certificates (managed by certbot) ────────────────────────────────
  ssl_certificate     /etc/letsencrypt/live/REPLACE_WITH_YOUR_DOMAIN/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/REPLACE_WITH_YOUR_DOMAIN/privkey.pem;
  include             /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

  # ── Modern TLS only ───────────────────────────────────────────────────────
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
  ssl_prefer_server_ciphers off;

  # ── OCSP stapling (faster cert validation for clients) ────────────────────
  ssl_stapling        on;
  ssl_stapling_verify on;
  resolver            8.8.8.8 8.8.4.4 valid=300s;
  resolver_timeout    5s;

  # ── Security headers (Nginx layer — applied before Express) ───────────────
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
  add_header X-Content-Type-Options    "nosniff"                                       always;
  add_header X-Frame-Options           "DENY"                                          always;
  add_header Referrer-Policy           "strict-origin-when-cross-origin"               always;

  # ── Client limits ─────────────────────────────────────────────────────────
  client_max_body_size 20m;
  client_body_timeout  30s;
  client_header_timeout 10s;

  # ── Logging ───────────────────────────────────────────────────────────────
  access_log /var/log/nginx/medierp-access.log;
  error_log  /var/log/nginx/medierp-error.log;

  # ── Auth routes — tightest rate limit ────────────────────────────────────
  location /api/v1/auth/ {
    limit_req zone=auth_zone burst=5 nodelay;
    limit_req_status 429;

    proxy_pass         http://medierp_backend;
    proxy_http_version 1.1;
    proxy_set_header   Connection        "";
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
  }

  # ── Scanner poll routes — higher frequency allowed ────────────────────────
  location /api/v1/scanner/ {
    limit_req zone=scanner_zone burst=30 nodelay;
    limit_req_status 429;

    proxy_pass         http://medierp_backend;
    proxy_http_version 1.1;
    proxy_set_header   Connection        "";
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
  }

  # ── All other API routes ──────────────────────────────────────────────────
  location /api/ {
    limit_req zone=api_zone burst=20 nodelay;
    limit_req_status 429;

    proxy_pass         http://medierp_backend;
    proxy_http_version 1.1;
    proxy_set_header   Connection        "";
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
    proxy_connect_timeout 10s;
  }

  # ── Uploaded files — served directly from disk ────────────────────────────
  location /uploads/ {
    alias /path/to/erp-unified-backend/uploads/;
    expires 1y;
    add_header Cache-Control "public, immutable";
    add_header X-Content-Type-Options "nosniff";
  }

  # ── SPA + static assets ───────────────────────────────────────────────────
  # Express serves the built React SPA from dist/ in production.
  # All non-API routes proxy to Express which returns index.html.
  location / {
    proxy_pass         http://medierp_backend;
    proxy_http_version 1.1;
    proxy_set_header   Connection        "";
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
  }
}
