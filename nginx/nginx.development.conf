# ══════════════════════════════════════════════════════════════════════════════
# nginx/nginx.development.conf
#
# Local development Nginx config — HTTPS with self-signed cert (mkcert).
# Use this if you need real HTTPS in dev (e.g. for camera on Android Chrome
# which requires HTTPS even on LAN).
#
# HOW TO USE:
#   1. Install mkcert:  https://github.com/FiloSottile/mkcert
#   2. Trust root CA:   mkcert -install
#   3. Create certs:    mkcert -key-file certs/localhost-key.pem \
#                               -cert-file certs/localhost.pem \
#                               localhost 127.0.0.1 192.168.1.x
#      (replace 192.168.1.x with your LAN IP from ipconfig/ip a)
#   4. Start Nginx:     nginx -c /path/to/nginx.development.conf
#   5. Open frontend:   https://192.168.1.x/
#      Open backend:    https://192.168.1.x/api/v1/
#
# Architecture (dev):
#   Phone ─── HTTPS:443 ──► Nginx ─► Vite :3000   (SPA + /scan route)
#                                  ─► Express :5000 (/api/v1/*)
# ══════════════════════════════════════════════════════════════════════════════

events { worker_connections 1024; }

http {
  # ── Logging ──────────────────────────────────────────────────────────────
  access_log /var/log/nginx/medierp-dev-access.log;
  error_log  /var/log/nginx/medierp-dev-error.log;

  # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
  server {
    listen 80;
    server_name localhost 127.0.0.1;
    return 301 https://$host$request_uri;
  }

  # ── HTTPS server ──────────────────────────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name localhost 127.0.0.1;

    # Certs generated by mkcert (trusted by browser after mkcert -install)
    ssl_certificate     /path/to/certs/localhost.pem;
    ssl_certificate_key /path/to/certs/localhost-key.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ── Backend API ──────────────────────────────────────────────────────
    location /api/ {
      proxy_pass         http://127.0.0.1:5000;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
    }

    # ── Uploads ──────────────────────────────────────────────────────────
    location /uploads/ {
      proxy_pass         http://127.0.0.1:5000;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Frontend (Vite dev server) ────────────────────────────────────────
    location / {
      proxy_pass         http://127.0.0.1:3000;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;

      # Required for Vite HMR (WebSocket upgrade)
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "upgrade";
    }
  }
}
